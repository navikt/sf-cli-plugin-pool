# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: zizmor GitHub Actions Security Analysis

on:
  push:
    branches: ["main"]
    paths:
      - ".github/**/*.yml"
  pull_request:
    branches: ["**"]
    paths:
      - ".github/**/*.yml"

permissions: {}
concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: zizmor latest via PyPI
    runs-on: ubuntu-latest
    permissions:
      security-events: write # for uploading SARIF files
      contents: read # for checking out the code
      actions: read # for checking out the code
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          persist-credentials: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b #v8.1.0

      - name: Run zizmor
        run: uvx zizmor --format sarif . > results.sarif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@25a224b8085c21d4d61b7fc051468805fc3ac490 # codeql-bundle-v2.24.0
        with:
          sarif_file: results.sarif
          category: zizmor
