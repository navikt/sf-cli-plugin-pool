name: tests
on:
  push:
    branches-ignore: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'scripts/**'
      - 'test-packages/**'
      - 'test-packages/sfdx-project.json.template'
      - 'tsconfig.json'
      - 'test/tsconfig.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'scripts/**'
      - 'test-packages/**'
      - 'test-packages/sfdx-project.json.template'
      - 'tsconfig.json'
      - 'test/tsconfig.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/test.yml'
  workflow_dispatch:

permissions: {}
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests and Linting
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  nuts:
    name: NUTs
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: navikt/sf-gha-install-sf-cli@86acd7148c91ca98a741259ec2ae6e8879b3e045
        with:
          version: '2.127.2'
      - name: Authenticate DevHub (JWT)
        shell: bash
        env:
          TESTKIT_HUB_USERNAME: ${{ secrets.TESTKIT_HUB_USERNAME }}
          TESTKIT_JWT_CLIENT_ID: ${{ secrets.TESTKIT_JWT_CLIENT_ID }}
          TESTKIT_JWT_KEY: ${{ secrets.TESTKIT_JWT_KEY }}
          TESTKIT_HUB_INSTANCE: ${{ secrets.TESTKIT_HUB_INSTANCE }}
        run: |
          printf '%s' "$TESTKIT_JWT_KEY" > server.key
          sf org login jwt \
            --client-id "$TESTKIT_JWT_CLIENT_ID" \
            --jwt-key-file server.key \
            --username "$TESTKIT_HUB_USERNAME" \
            --instance-url "$TESTKIT_HUB_INSTANCE" \
            --set-default-dev-hub \
            --alias devhub
          rm -f server.key
      - name: Set up test packages
        run: node scripts/setup-test-packages.js --target-dev-hub devhub --yes
      - name: Run NUTs
        run: pnpm run test:nuts
        env:
          TESTKIT_HUB_USERNAME: ${{ secrets.TESTKIT_HUB_USERNAME }} # From @salesforce/cli-plugins-testkit
          TESTKIT_JWT_CLIENT_ID: ${{ secrets.TESTKIT_JWT_CLIENT_ID }} # From @salesforce/cli-plugins-testkit
          TESTKIT_JWT_KEY: ${{ secrets.TESTKIT_JWT_KEY }} # From @salesforce/cli-plugins-testkit
          TESTKIT_HUB_INSTANCE: ${{ secrets.TESTKIT_HUB_INSTANCE }} # From @salesforce/cli-plugins-testkit
