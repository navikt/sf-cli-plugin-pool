name: tests
on:
  push:
    branches-ignore: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'scripts/**'
      - 'test-packages/**'
      - 'test-packages/sfdx-project.json.template'
      - 'tsconfig.json'
      - 'test/tsconfig.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'scripts/**'
      - 'test-packages/**'
      - 'test-packages/sfdx-project.json.template'
      - 'tsconfig.json'
      - 'test/tsconfig.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/test.yml'
  workflow_dispatch:

permissions: {}
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-nuts-relevance:
    name: Detect NUT Relevance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      nuts_by_path: ${{ steps.detect.outputs.nuts_by_path }}
      nuts_by_runtime_deps: ${{ steps.detect.outputs.nuts_by_runtime_deps }}
      run_nuts: ${{ steps.detect.outputs.run_nuts }}
      decision_reason: ${{ steps.detect.outputs.decision_reason }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
      - name: Detect NUT relevance
        id: detect
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          node <<'NODE'
          const {execSync} = require('node:child_process');
          const fs = require('node:fs');

          const outputFile = process.env.GITHUB_OUTPUT;

          const writeOutput = (name, value) => {
            fs.appendFileSync(outputFile, `${name}=${value}\n`);
          };

          const eventName = process.env.GITHUB_EVENT_NAME;

          if (eventName === 'workflow_dispatch') {
            writeOutput('nuts_by_path', 'false');
            writeOutput('nuts_by_runtime_deps', 'false');
            writeOutput('run_nuts', 'true');
            writeOutput('decision_reason', 'manual_override');
            process.exit(0);
          }

          if (eventName !== 'pull_request') {
            writeOutput('nuts_by_path', 'false');
            writeOutput('nuts_by_runtime_deps', 'false');
            writeOutput('run_nuts', 'false');
            writeOutput('decision_reason', 'non_pr_event');
            process.exit(0);
          }

          const baseSha = process.env.PR_BASE_SHA;
          const headSha = process.env.PR_HEAD_SHA;

          if (!baseSha || !headSha) {
            throw new Error('Missing base or head SHA for pull request event.');
          }

          const changedFiles = execSync(`git diff --name-only ${baseSha} ${headSha}`, {
            encoding: 'utf8',
          })
            .split('\n')
            .map((file) => file.trim())
            .filter(Boolean);

          const nutsByPath = changedFiles.some((file) => {
            if (file.startsWith('src/')) {
              return true;
            }

            if (file.startsWith('test/') && file.endsWith('.nut.ts')) {
              return true;
            }

            if (file === 'scripts/setup-test-packages.js') {
              return true;
            }

            if (file.startsWith('test-packages/')) {
              return true;
            }

            return file === '.github/workflows/test.yml';
          });

          let nutsByRuntimeDeps = false;
          if (changedFiles.includes('package.json')) {
            const basePackage = JSON.parse(execSync(`git show ${baseSha}:package.json`, {encoding: 'utf8'}));
            const headPackage = JSON.parse(execSync(`git show ${headSha}:package.json`, {encoding: 'utf8'}));

            const runtimeSections = ['dependencies', 'optionalDependencies', 'peerDependencies'];
            nutsByRuntimeDeps = runtimeSections.some((section) => {
              const before = JSON.stringify(basePackage[section] ?? {});
              const after = JSON.stringify(headPackage[section] ?? {});
              return before !== after;
            });
          }

          const runNuts = nutsByPath || nutsByRuntimeDeps;
          let decisionReason = 'not_relevant';

          if (nutsByPath && nutsByRuntimeDeps) {
            decisionReason = 'path_and_runtime_deps';
          } else if (nutsByPath) {
            decisionReason = 'path_change';
          } else if (nutsByRuntimeDeps) {
            decisionReason = 'runtime_dependency_change';
          }

          writeOutput('nuts_by_path', String(nutsByPath));
          writeOutput('nuts_by_runtime_deps', String(nutsByRuntimeDeps));
          writeOutput('run_nuts', String(runNuts));
          writeOutput('decision_reason', decisionReason);
          NODE
      - name: Summarize NUT decision
        run: |
          echo "run_nuts=${{ steps.detect.outputs.run_nuts }}" >> "$GITHUB_STEP_SUMMARY"
          echo "reason=${{ steps.detect.outputs.decision_reason }}" >> "$GITHUB_STEP_SUMMARY"

  unit-tests:
    name: Build, Lint and Unit Tests
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Lint
        run: pnpm run lint
      - name: Run unit tests
        run: pnpm run test:only

  setup-packages:
    name: Set up Test Packages
    needs: detect-nuts-relevance
    if: needs.detect-nuts-relevance.result == 'success' && needs.detect-nuts-relevance.outputs.run_nuts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: navikt/sf-gha-install-sf-cli@86acd7148c91ca98a741259ec2ae6e8879b3e045
        with:
          version: '2.127.2'
      - name: Authenticate DevHub (JWT)
        shell: bash
        env:
          TESTKIT_HUB_USERNAME: ${{ secrets.TESTKIT_HUB_USERNAME }}
          TESTKIT_JWT_CLIENT_ID: ${{ secrets.TESTKIT_JWT_CLIENT_ID }}
          TESTKIT_JWT_KEY: ${{ secrets.TESTKIT_JWT_KEY }}
          TESTKIT_HUB_INSTANCE: ${{ secrets.TESTKIT_HUB_INSTANCE }}
        run: |
          sf org login jwt \
            --client-id "$TESTKIT_JWT_CLIENT_ID" \
            --jwt-key-file <(printf '%s' "$TESTKIT_JWT_KEY") \
            --username "$TESTKIT_HUB_USERNAME" \
            --instance-url "$TESTKIT_HUB_INSTANCE" \
            --set-default-dev-hub \
            --alias devhub
      - name: Set up test packages
        run: node scripts/setup-test-packages.js --target-dev-hub devhub --yes
      - name: Upload generated sfdx-project.json
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sfdx-project-json
          path: sfdx-project.json
          if-no-files-found: error
          retention-days: 1

      - name: Logout from Dev Hub
        if: always()
        shell: bash
        run: sf org logout --target-org devhub --no-prompt || true

  nuts:
    name: NUTs
    if: needs.detect-nuts-relevance.result == 'success' && needs.detect-nuts-relevance.outputs.run_nuts == 'true' && needs.setup-packages.result == 'success'
    needs:
      - detect-nuts-relevance
      - setup-packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download generated sfdx-project.json
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sfdx-project-json
          path: .
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - uses: navikt/sf-gha-install-sf-cli@86acd7148c91ca98a741259ec2ae6e8879b3e045
        with:
          version: '2.127.2'
      - name: Authenticate DevHub (JWT)
        shell: bash
        env:
          TESTKIT_HUB_USERNAME: ${{ secrets.TESTKIT_HUB_USERNAME }}
          TESTKIT_JWT_CLIENT_ID: ${{ secrets.TESTKIT_JWT_CLIENT_ID }}
          TESTKIT_JWT_KEY: ${{ secrets.TESTKIT_JWT_KEY }}
          TESTKIT_HUB_INSTANCE: ${{ secrets.TESTKIT_HUB_INSTANCE }}
        run: |
          sf org login jwt \
            --client-id "$TESTKIT_JWT_CLIENT_ID" \
            --jwt-key-file <(printf '%s' "$TESTKIT_JWT_KEY") \
            --username "$TESTKIT_HUB_USERNAME" \
            --instance-url "$TESTKIT_HUB_INSTANCE" \
            --set-default-dev-hub \
            --alias devhub
      - name: Run NUT tests
        run: pnpm run test:nuts
        env:
          TESTKIT_HUB_USERNAME: ${{ secrets.TESTKIT_HUB_USERNAME }} # From @salesforce/cli-plugins-testkit
          TESTKIT_JWT_CLIENT_ID: ${{ secrets.TESTKIT_JWT_CLIENT_ID }} # From @salesforce/cli-plugins-testkit
          TESTKIT_JWT_KEY: ${{ secrets.TESTKIT_JWT_KEY }} # From @salesforce/cli-plugins-testkit
          TESTKIT_HUB_INSTANCE: ${{ secrets.TESTKIT_HUB_INSTANCE }} # From @salesforce/cli-plugins-testkit
      - name: Logout from Dev Hub
        if: always()
        shell: bash
        run: sf org logout --target-org devhub --no-prompt || true

  nuts-status:
    name: NUT Status
    if: always()
    needs:
      - detect-nuts-relevance
      - setup-packages
      - nuts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate NUT outcome
        shell: bash
        run: |
          if [[ "${{ needs.detect-nuts-relevance.result }}" != 'success' ]]; then
            echo 'Failed to determine whether NUTs are required.'
            exit 1
          fi

          if [[ "${{ needs.detect-nuts-relevance.outputs.run_nuts }}" != 'true' ]]; then
            echo 'NUTs were skipped because the change set is not NUT-relevant.'
            exit 0
          fi

          if [[ "${{ needs.setup-packages.result }}" != 'success' ]]; then
            echo 'NUTs were required, but test package setup failed.'
            exit 1
          fi

          if [[ "${{ needs.nuts.result }}" != 'success' ]]; then
            echo 'NUTs were required, but the NUT job did not succeed.'
            exit 1
          fi

          echo 'NUTs were required and completed successfully.'
